<svg id="diagram" viewBox="0 0 840 520" role="img" aria-labelledby="diagramTitle diagramDesc" xmlns="http://www.w3.org/2000/svg">
  <title id="diagramTitle">Diagram for Proposition I.38</title>
  <desc id="diagramDesc">Triangles ABC and DEF on equal bases BC and EF, between the same parallels BF and AD.</desc>

  <defs>
    <pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#16a34a" stroke-width="1"/>
    </pattern>
  </defs>

  <line id="lineBF" x1="40" y1="360" x2="800" y2="360" stroke="var(--svg-grid)" stroke-width="2" stroke-dasharray="6 8" />
  <line id="lineAD" x1="40" y1="120" x2="800" y2="120" stroke="var(--svg-grid)" stroke-width="2" stroke-dasharray="6 8" />

  <g id="triA_parts">
    <line id="BC" x1="140" y1="360" x2="300" y2="360" stroke="var(--svg-ink)" stroke-width="2"/>
    <line id="CA" x1="300" y1="360" x2="230" y2="120" stroke="var(--svg-ink)" stroke-width="2"/>
    <line id="AB" x1="230" y1="120" x2="140" y2="360" stroke="var(--svg-ink)" stroke-width="2"/>
  </g>
  <line class="tick" id="tickBC" x1="220" y1="355" x2="220" y2="365" stroke="var(--svg-ink)" stroke-width="2"/>

  <g id="triD_parts">
    <line id="EF" x1="520" y1="360" x2="680" y2="360" stroke="var(--svg-ink)" stroke-width="2"/>
    <line id="DE" x1="610" y1="120" x2="520" y2="360" stroke="var(--svg-ink)" stroke-width="2"/>
    <line id="DF" x1="610" y1="120" x2="680" y2="360" stroke="var(--svg-ink)" stroke-width="2"/>
  </g>
  <line class="tick" id="tickEF" x1="600" y1="355" x2="600" y2="365" stroke="var(--svg-ink)" stroke-width="2"/>

  <line id="lineBG" class="hidden no-draw" aria-hidden="true" x1="140" y1="360" x2="70" y2="120" stroke="#6b7280" stroke-width="2" />
  <line id="lineFH" class="hidden no-draw" aria-hidden="true" x1="680" y1="360" x2="770" y2="120" stroke="#6b7280" stroke-width="2" />
  <line id="diagAB" class="hidden no-draw" aria-hidden="true" x1="230" y1="120" x2="140" y2="360" stroke="#64748b" stroke-width="2.5" stroke-dasharray="6 6" />
  <line id="diagDF" class="hidden no-draw" aria-hidden="true" x1="610" y1="120" x2="680" y2="360" stroke="#64748b" stroke-width="2.5" stroke-dasharray="6 6" />

  <polygon id="paraGBCA" class="hidden" aria-hidden="true" points="70,120 140,360 300,360 230,120" fill="none" stroke="var(--svg-ink)" stroke-width="2"/>
  <polygon id="paraDEFH" class="hidden" aria-hidden="true" points="610,120 520,360 680,360 770,120" fill="none" stroke="var(--svg-ink)" stroke-width="2"/>

  <g id="explore-handles" class="hidden" aria-hidden="true">
    <circle id="handleA_ring" class="handle-ring" cx="230" cy="120" r="14"></circle>
    <circle id="handleA" class="handle" cx="230" cy="120" r="8" tabindex="0" aria-label="Drag point A"></circle>

    <circle id="handleD_ring" class="handle-ring" cx="610" cy="120" r="14"></circle>
    <circle id="handleD" class="handle" cx="610" cy="120" r="8" tabindex="0" aria-label="Drag point D"></circle>
  </g>

  <g id="labels" font-size="18" font-weight="bold" fill="var(--svg-ink)">
    <text id="lblA" x="225" y="110">A</text>
    <text id="lblB" x="135" y="385">B</text>
    <text id="lblC" x="295" y="385">C</text>
    <text id="lblD" x="605" y="110">D</text>
    <text id="lblE" x="515" y="385">E</text>
    <text id="lblF" x="675" y="385">F</text>
    <text id="lblG" x="60"  y="110">G</text>
    <text id="lblH" x="770" y="110">H</text>
  </g>
</svg>
